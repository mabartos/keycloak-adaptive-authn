# default providers
kc.spi--ai-engine--provider=${KC_SPI_AI_ENGINE_PROVIDER:granite}
kc.spi--risk-engine--provider=${KC_SPI_RISK_ENGINE_PROVIDER:default}
kc.spi--risk-score-algorithm--provider=${KC_SPI_RISK_SCORE_ALGORITHM_PROVIDER:log-odds}

# OpenAI ChatGPT AI
ai.openai.api.url=${OPEN_AI_API_URL:https://api.openai.com/v1/chat/completions}
ai.openai.api.key=${OPEN_AI_API_KEY}
ai.openai.api.organization=${OPEN_AI_API_ORGANIZATION}
ai.openai.api.project=${OPEN_AI_API_PROJECT}
ai.openai.api.model=${OPEN_AI_API_MODEL:gpt-4o-mini}

# IBM Granite AI
ai.granite.api.url=${GRANITE_API_URL}
ai.granite.api.key=${GRANITE_API_KEY}
ai.granite.api.model=${GRANITE_API_MODEL:granite-8b-code-instruct-128k}

# Claude AI
ai.claude.api.url=${CLAUDE_API_URL:https://api.anthropic.com/v1/messages}
ai.claude.api.key=${CLAUDE_API_KEY}
ai.claude.api.model=${CLAUDE_API_MODEL:claude-haiku-4-5-20251001}
ai.claude.api.version=${CLAUDE_API_VERSION:2023-06-01}
ai.claude.api.enable.caching=${CLAUDE_API_ENABLE_CACHING:true}

# Google Gemini AI
ai.gemini.api.url=${GEMINI_API_URL:https://generativelanguage.googleapis.com/v1beta}
ai.gemini.api.key=${GEMINI_API_KEY}
ai.gemini.api.model=${GEMINI_API_MODEL:gemini-2.5-flash-lite}

# AI Data Anonymizer
ai.anonymize.enabled=${AI_ANONYMIZE_ENABLED:true}

# reCAPTCHA
recaptcha.site.key=${RECAPTCHA_SITE_KEY}
recaptcha.project.id=${RECAPTCHA_PROJECT_ID}
recaptcha.project.api.key=${RECAPTCHA_PROJECT_API_KEY}

# testing
ip.address.testing.random.enabled=${KC_AA_TESTING_RANDOM_IP_ENABLED:false}
ip.address.testing.value=${KC_AA_TESTING_IP_VALUE:}

# location
location.ipapi.token=${KC_AA_IPAPI_TOKEN:}
location.global-cache.ttl=${KC_AA_LOCATION_GLOBAL_CACHE_TTL:PT24H}
location.global-cache.maximum-size=${KC_AA_LOCATION_GLOBAL_CACHE_MAXIMUM_SIZE:10000}