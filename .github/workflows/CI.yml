name: Build Keycloak Adaptive Authentication extension

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - keycloak-version: 999.0.0-SNAPSHOT
            build-args: ""
            test-args: -Dkeycloak.version=999.0.0-SNAPSHOT
          - keycloak-version: 26.6.2
            build-args: -Pdist-maven -Dkeycloak.version=26.6.2 -Dkeycloak.test.realm.source=released
            test-args: -Dkeycloak.version=26.6.2 -Dkeycloak.test.realm.source=released

    name: Keycloak ${{ matrix.keycloak-version }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build extension
      # maven.test.skip (not skipTests): tests compile later with test-args (version may differ from build)
      run: ./mvnw clean install -Dmaven.test.skip=true -Pbuild-distribution ${{ matrix.build-args }}

    - name: Test execute 'build' command
      run: ./mvnw -f core exec:exec@build ${{ matrix.test-args }}

    - name: Unit tests
      run: ./mvnw -f core test ${{ matrix.test-args }}

    - name: Integration tests
      run: ./mvnw -f tests test ${{ matrix.test-args }}
